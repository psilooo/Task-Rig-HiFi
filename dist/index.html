<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Task Rig // AI Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zinc: {
              850: '#1f1f22', // Custom intermediate shade
              900: '#18181b',
              950: '#09090b',
            },
            red: {
              800: '#991b1b',
              900: '#7f1d1d',
            },
            orange: {
              500: '#f97316', // Tailwind default, but explicit
              600: '#ea580c',
            }
          },
          fontFamily: {
            heading: ['fktgnarly', '"IBM Plex Sans Condensed"', 'sans-serif'],
            body: ['fktgnarly', '"Instrument Serif"', 'serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          backgroundImage: {
            'grid-pattern': "linear-gradient(to right, #3f3f4620 1px, transparent 1px), linear-gradient(to bottom, #3f3f4620 1px, transparent 1px)",
          },
          keyframes: {
            'scan-vertical': {
              '0%': { top: '-10%', opacity: '0' },
              '20%': { opacity: '1' },
              '80%': { opacity: '1' },
              '100%': { top: '110%', opacity: '0' },
            },
            'scan-vertical-reverse': {
              '0%': { bottom: '-10%', opacity: '0' },
              '20%': { opacity: '1' },
              '80%': { opacity: '1' },
              '100%': { bottom: '110%', opacity: '0' },
            },
            'scan-horizontal': {
              '0%': { left: '-10%', opacity: '0' },
              '20%': { opacity: '1' },
              '80%': { opacity: '1' },
              '100%': { left: '110%', opacity: '0' },
            },
            'scan-horizontal-reverse': {
              '0%': { right: '-10%', opacity: '0' },
              '20%': { opacity: '1' },
              '80%': { opacity: '1' },
              '100%': { right: '110%', opacity: '0' },
            }
          },
          animation: {
            'scan-vertical': 'scan-vertical 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan-vertical-reverse': 'scan-vertical-reverse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan-horizontal': 'scan-horizontal 3.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan-horizontal-reverse': 'scan-horizontal-reverse 4.5s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          }
        }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'fktgnarly';
      src: url('/fonts/1693382538-fktgnarly_wght-vf.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
      ascent-override: 95%;
    }

    body {
      background-color: #18181b;
      /* Zinc 900 */
      color: #f4f4f5;
      /* Zinc 100 */
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #f97316;
      /* Orange 500 */
      border-radius: 4px;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
      /* Glow effect matching header */
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ea580c;
      /* Orange 600 */
    }

    .grid-bg {
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    /* Custom utility for slanted buttons */
    .clip-path-slant {
      clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
    }

    /* Marquee animation for social proof strip */
    .marquee-track {
      overflow: hidden;
      width: 100%;
    }

    .marquee-content {
      display: flex;
      width: max-content;
      animation: marquee-scroll 30s linear infinite;
    }

    .marquee-content:hover {
      animation-play-state: paused;
    }

    @keyframes marquee-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Orbiting glow for Premium pricing card */
    @keyframes border-rotate {
      0% { --border-angle: 0deg; }
      100% { --border-angle: 360deg; }
    }

    @property --border-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    .glow-border {
      --border-angle: 0deg;
      animation: border-rotate 4s linear infinite;
      background:
        conic-gradient(from var(--border-angle), transparent 50%, rgba(249,115,22,0.5) 75%, rgba(255,106,21,0.8) 88%, rgba(249,115,22,0.5) 100%) border-box;
      border: 3px solid transparent;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
    }

    @keyframes connector-dot {
      0% { top: -4px; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: calc(100% - 4px); opacity: 0; }
    }

    /* Mobile scroll performance: disable expensive GPU effects */
    @media (max-width: 767px) {
      * {
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
      }
    }

    /* Safe-area insets for notched devices */
    nav.fixed {
      padding-top: env(safe-area-inset-top);
    }

    footer {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Reduced motion: disable decorative CSS animations */
    @media (prefers-reduced-motion: reduce) {
      .marquee-content,
      .animate-pulse,
      .animate-spin,
      [class*="animate-scan"],
      .glow-border {
        animation: none !important;
      }
    }
  </style>

  <link rel="stylesheet" href="/index.css">
  <script async src="https://maps.googleapis.com/maps/api/js?key=%VITE_GOOGLE_PLACES_API_KEY%&libraries=places"></script>

{
  "imports": {
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.6.2"
  }
}
</script>

</head>

<body>

</body>

</html>
